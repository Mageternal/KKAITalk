; ===== 角色音色配置 =====
; 格式: [timbre_角色名]
; - ref_audio: 参考音频文件路径（相对于 audio\timbre 文件夹）
; - ref_text: 参考音频对应的文本
; - language: 语言（chinese/english/japanese等）
; - temperature: 采样温度（0.0-1.0）
; - sub_temperature: 子采样温度（0.0-1.0）
; - instruct: 情感指令（如：温柔撒娇、冷静、活泼等）

; ===== 角色喘息配置 =====
; 格式: [respite_角色名]
; - audio_files: 喘息音频文件列表（相对于 audio\respite 文件夹，用 | 分隔）
; - 或者直接在 audio\respite\角色名\ 文件夹下放入音频文件

; ===== 使用说明 =====
; 1. 角色名必须与游戏中的角色名完全匹配
; 2. 参考音频放入 audio\timbre 文件夹
; 3. 喘息音频放入 audio\respite\角色名\ 文件夹
; 4. 重启插件使配置生效

; ===== 示例配置 =====

[timbre_高垣 枫]
ref_audio=1.wav
ref_text=林老先生慢悠悠地擦拭着紫砂壶，壶身泛着温润的光泽。茶香袅袅升起，与窗外桂花的甜香交织在一起。他抬头望向街角，仿佛在等待什么。邻桌的年轻姑娘正低头看书，偶尔抬头望向窗外，眉眼间带着淡淡的期待。茶壶中的水沸了，林老先生轻轻提起，将琥珀色的茶汤注入杯中。
language=chinese
temperature=0.6
sub_temperature=0.6
instruct=

; [respite_xxx]
; audio_files=xxx_01.wav|xxx_02.wav|xxx_03.wav